name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check Node sources (gateway / mcp / agent)
        run: |
          set -e
          for f in $(git ls-files '*.mjs' '*.js' | grep -vE 'node_modules'); do
            node --check "$f"
          done
      - name: Contract sources present
        run: test -d contract && ls contract
